<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanized Minimalist Elegant Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
        }

        .card {
            width: 440px;
            height: 230px;
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            display: flex;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .card:hover {
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            transform: translateY(-5px);
        }

        .left-col {
            width: 35%;
            background-color: #222;
            background-image: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(1.2);
        }

        .right-col {
            width: 65%;
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-family: 'Lato', sans-serif;
            color: #333;
        }

        .greeting {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1rem;
            color: #777;
            margin-bottom: 5px;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin: 0;
            color: #111;
        }

        .role {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        .contact {
            font-size: 0.85rem;
            line-height: 1.8;
            color: #555;
            display: flex;
            flex-direction: column;
        }

        .line {
            width: 30px;
            height: 2px;
            background-color: #222;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="left-col">
            <!-- Full column sleek portrait -->
        </div>
        <div class="right-col">
            <div class="greeting">Nice to meet you,</div>
            <h1 class="name">Prathamesh</h1>
            <div class="role">Chief Executive Officer</div>
            
            <div class="line"></div>
            
            <div class="contact">
                <span>T. +91 98765 43210</span>
                <span>E. me@prathamesh.dev</span>
            </div>
        </div>
    </div>
</body>
</html>
