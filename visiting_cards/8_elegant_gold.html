<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanized Elegant Gold Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400&family=Dancing+Script&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #dedede;
        }

        .card {
            width: 460px;
            height: 250px;
            background-color: #0a0a0a;
            border-radius: 5px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            position: relative;
            color: #d4af37;
            padding: 35px 40px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at top right, #1a1a1a, transparent 60%);
            border: 1px solid #2a2a2a;
            transition: transform 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .portrait {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
            filter: grayscale(80%) contrast(1.2); /* elegant black/gold vibe */
        }

        .gold-line {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, #d4af37, #f3e5ab, #d4af37);
            margin-bottom: 15px;
        }

        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .designation {
            font-family: 'Jost', sans-serif;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: #888;
            margin-top: 5px;
        }

        .separator {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            margin: 15px 0;
        }

        .details {
            font-family: 'Jost', sans-serif;
            font-size: 0.8rem;
            color: #a0a0a0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .contact-col {
            display: flex;
            gap: 20px;
            letter-spacing: 1px;
        }

        .contact-col strong {
            color: #d4af37;
            font-weight: 400;
            margin-right: 5px;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: rgba(212, 175, 55, 0.6);
            transform: rotate(-5deg);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="top-section">
            <div>
                <div class="gold-line"></div>
                <h1 class="name">Prathamesh Shinde</h1>
                <div class="designation">Founder & CEO</div>
            </div>
            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&auto=format&fit=crop&w=256&h=256&q=80" alt="Profile" class="portrait">
        </div>
        
        <div class="separator"></div>
        
        <div class="details">
            <div class="contact-col">
                <div><strong>T</strong> +91 98765 43210</div>
                <div><strong>E</strong> prathamesh@gold.dev</div>
            </div>
            <div class="signature">
                Prathamesh
            </div>
        </div>
    </div>
</body>
</html>
