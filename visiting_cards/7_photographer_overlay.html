<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanized Photographer Overlay Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;400;500&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #2c2c2c;
        }

        .card {
            width: 480px;
            height: 280px;
            background-image: url('https://images.unsplash.com/photo-1542038784456-1ea8e935640e?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
            transition: transform 0.4s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .overlay-box {
            width: 100%;
            height: 50%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            transition: height 0.3s;
        }

        .card:hover .overlay-box {
            height: 60%;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
        }

        .name-sec h1 {
            margin: 0;
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        .name-sec h2 {
            margin: 5px 0 0 0;
            font-family: 'Quicksand', sans-serif;
            font-weight: 300;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #d1d5db;
        }

        .message {
            font-family: 'Quicksand', sans-serif;
            font-weight: 400;
            font-style: italic;
            font-size: 0.85rem;
            color: #9ca3af;
            max-width: 60%;
        }

        .contact-sec {
            display: flex;
            gap: 20px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.8rem;
            color: #dedede;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="overlay-box">
            <div class="header-row">
                <div class="name-sec">
                    <h1>Prathamesh Shinde</h1>
                    <h2>Visual Artist & Director</h2>
                </div>
                <div class="message">
                    "Hi! Let's capture the story <br>that defines your vision."
                </div>
            </div>
            <div class="contact-sec">
                <div>+91 98765 43210</div>
                <div>hello@prathamesh.dev</div>
                <div>@prathamesh_creates</div>
            </div>
        </div>
    </div>
</body>
</html>
