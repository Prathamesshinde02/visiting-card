<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanized 3D Flip Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
            font-family: 'Poppins', sans-serif;
            perspective: 1000px;
        }

        .flip-card {
            background-color: transparent;
            width: 420px;
            height: 240px;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border-radius: 12px;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .flip-card-front {
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .flip-card-front img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        .flip-card-back {
            background: white;
            color: #1e293b;
            transform: rotateY(180deg);
            padding: 30px;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
        }

        .front-title {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .back-name {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 0 5px 0;
            color: #4f46e5;
        }

        .back-greeting {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 25px;
            font-style: italic;
        }

        .back-details {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.85rem;
            text-align: left;
            color: #475569;
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="flip-card">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?ixlib=rb-1.2.1&auto=format&fit=crop&w=256&h=256&q=80" alt="Prathamesh">
                <div class="front-title">Prathamesh Shinde</div>
                <div class="tagline">Hover to connect</div>
            </div>
            <div class="flip-card-back">
                <h1 class="back-name">Prathamesh Shinde</h1>
                <div class="back-greeting">"Awesome to meet you. Here's how to reach me:"</div>
                
                <div class="back-details">
                    <div class="col">
                        <span>📱 +91 98765 43210</span>
                        <span>✉️ hello@tech.dev</span>
                    </div>
                    <div class="col" style="text-align: right;">
                        <span>🌐 prathamesh.dev</span>
                        <span>📍 Mumbai, IN</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
