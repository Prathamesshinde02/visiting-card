<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humanized Glassmorphism Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #ff7b00, #ff007b, #7b00ff);
            background-size: 300% 300%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .shape {
            position: absolute;
            filter: blur(50px);
            z-index: 1;
        }
        .shape1 { width: 300px; height: 300px; background: rgba(255, 255, 255, 0.4); border-radius: 50%; top: -100px; left: -100px; }
        .shape2 { width: 400px; height: 400px; background: rgba(255, 123, 0, 0.4); border-radius: 50%; bottom: -150px; right: -50px; }

        .card {
            width: 480px;
            height: 260px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            padding: 30px;
            box-sizing: border-box;
            color: #ffffff;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 25px;
            position: relative;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.3);
        }

        .profile-container {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .name-sec h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .name-sec h2 {
            margin: 5px 0 15px 0;
            font-size: 1rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 1px;
        }

        .intro {
            font-size: 0.85rem;
            font-weight: 300;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.8);
            line-height: 1.4;
        }

        .contact-sec {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 400;
        }

        .contact-sec span { display: flex; align-items: center; gap: 8px; }

    </style>
</head>
<body>
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>

    <div class="card">
        <div class="profile-container">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?ixlib=rb-1.2.1&auto=format&fit=crop&w=256&h=256&q=80" alt="I'm Prathamesh" class="profile-img">
        </div>
        <div class="name-sec">
            <h1>Hey, I'm<br>Prathamesh.</h1>
            <h2>Creative Developer</h2>
            <div class="contact-sec">
                <span>📞 +91 98765 43210</span>
                <span>📧 hello@prathamesh.dev</span>
            </div>
        </div>
    </div>
</body>
</html>
